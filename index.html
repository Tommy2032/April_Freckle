<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Часы и Погода</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

    :root {
      --bg-primary: #0a0a12;
      --card-bg: rgba(20, 20, 30, 0.9);
      --accent: #00e5ff;
      --accent-warm: #ff4d6d;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --border-glow: rgba(0, 229, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 77, 109, 0.05) 0%, transparent 40%);
    }

    /* ЧАСЫ */
    .clock-container { margin-bottom: 40px; perspective: 1000px; }
    .flip-clock { display: flex; gap: 16px; align-items: center; filter: drop-shadow(0 0 20px var(--border-glow)); }
    .separator { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; padding: 0 10px; height: 180px; }
    .separator span { display: block; width: 16px; height: 16px; background-color: var(--accent-warm); border-radius: 50%; box-shadow: 0 0 10px var(--accent-warm); animation: blink 1.5s infinite; }
    .separator span:nth-child(2) { animation-delay: 0.75s; }

    @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }

    .digit-box {
      position: relative;
      width: 110px;
      height: 180px;
      border-radius: 16px;
      background: linear-gradient(145deg, #1a1a28, #0d0d14);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .digit-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 2.5, 0.6, 0.5);
    }

    .digit-flip .digit-inner { transform: rotateX(90deg); }

    .digit-half {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      backface-visibility: hidden;
      border-radius: 16px;
    }

    .top-half {
      top: 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transform-origin: center bottom;
      transform: rotateX(0deg);
      z-index: 2;
      background: linear-gradient(to bottom, #1e1e28 0%, #15151d 100%);
    }

    .bottom-half {
      bottom: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      transform-origin: center top;
      transform: rotateX(90deg);
      z-index: 1;
      background: linear-gradient(to top, #1e1e28 0%, #15151d 100%);
    }

    .digit-flip .top-half { transform: rotateX(-90deg); }
    .digit-flip .bottom-half { transform: rotateX(0deg); }

    .digit-value {
      position: absolute;
      left: 0;
      width: 100%;
      height: 200%;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 90px; /* Уменьшено для предотвращения обрезки */
      line-height: 180px;
      text-align: center;
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.4), 0 5px 5px rgba(0,0,0,0.8);
      letter-spacing: -2px;
    }

    .top-half .digit-value {
      top: 0;
      background: linear-gradient(to bottom, #e0e0e0 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bottom-half .digit-value {
      top: -100%;
      background: linear-gradient(to top, #e0e0e0 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ПОГОДА */
    .weather-container {
      position: relative;
      width: 90%;
      max-width: 700px;
      padding: 40px;
      background: var(--card-bg);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .weather-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
    .weather-location h2 { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 28px; color: var(--text-primary); letter-spacing: 1px; }
    .weather-location p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    .weather-temp { text-align: right; }
    .weather-temp .temp-value { font-family: 'Orbitron', monospace; font-size: 64px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, var(--accent), #00b4d8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .weather-temp .temp-desc { color: var(--text-secondary); font-size: 16px; margin-top: 4px; }

    .weather-canvas-container { position: relative; height: 200px; margin-bottom: 20px; border-radius: 16px; overflow: hidden; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%); }
    #lightningOverlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: white; opacity: 0; pointer-events: none; z-index: 10; }
    #weatherCanvas { width: 100%; height: 100%; display: block; }

    .weather-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
    .detail-item { text-align: center; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
    .detail-value { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .detail-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ПРОГНОЗ ПО ЧАСАМ */
    .hourly-container {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding-bottom: 10px;
      margin-bottom: 25px;
    }
    .hourly-container::-webkit-scrollbar { height: 6px; }
    .hourly-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 3px; }
    .hourly-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    
    .hourly-item {
      min-width: 65px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      padding: 12px 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .hourly-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .hourly-icon { font-size: 24px; margin-bottom: 8px; }
    .hourly-temp { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: var(--text-primary); }

    /* ПРОГНОЗ НА НЕДЕЛЮ */
    .forecast-section { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; }
    .forecast-title { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px; text-align: center; letter-spacing: 1px; }
    .forecast-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .forecast-day { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 15px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s, border-color 0.2s; }
    .forecast-day:hover { transform: translateY(-3px); border-color: var(--border-glow); }
    .forecast-day.today { border-color: var(--accent); background: rgba(0, 229, 255, 0.08); }
    .forecast-day-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .forecast-icon { font-size: 28px; margin-bottom: 8px; }
    .forecast-temp { display: flex; justify-content: center; gap: 8px; font-family: 'Orbitron', monospace; font-size: 14px; }
    .forecast-temp-max { color: var(--text-primary); font-weight: 700; }
    .forecast-temp-min { color: var(--text-secondary); }
    .forecast-desc { font-size: 10px; color: var(--text-secondary); margin-top: 6px; line-height: 1.2; }

    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-secondary); font-size: 14px; }
    .error-msg { color: var(--accent-warm); font-size: 14px; text-align: center; padding: 20px; }

    @media (max-width: 768px) {
      .separator { height: 120px; }
      .digit-box { width: 70px; height: 120px; }
      .digit-value { font-size: 60px; line-height: 120px; }
      .weather-canvas-container { height: 150px; }
      .forecast-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 480px) {
      .flip-clock { gap: 8px; }
      .digit-box { width: 50px; height: 80px; border-radius: 10px; }
      .digit-value { font-size: 40px; line-height: 80px; }
      .separator { height: 80px; padding: 0 4px; }
      .separator span { width: 8px; height: 8px; }
      .clock-container { margin-bottom: 20px; }
      .weather-header { flex-direction: column; gap: 15px; }
      .weather-temp { text-align: left; }
      .forecast-grid { grid-template-columns: repeat(2, 1fr); }
      .weather-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="clock-container">
  <div class="flip-clock" id="flipClock"></div>
</div>

<div class="weather-container" id="weatherCard">
  <div id="lightningOverlay"></div>
  
  <div class="loading" id="weatherLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Загрузка погоды...</div>
  </div>
  
  <div class="weather-content" id="weatherContent" style="display: none;">
    <div class="weather-header">
      <div class="weather-location">
        <h2 id="locationName">Орёл, Россия</h2>
        <p id="weatherDate">Загрузка...</p>
      </div>
      <div class="weather-temp">
        <div class="temp-value" id="tempValue">--°</div>
        <div class="temp-desc" id="tempDesc">--</div>
      </div>
    </div>

    <div class="weather-canvas-container">
      <canvas id="weatherCanvas"></canvas>
    </div>

    <div class="weather-details">
      <div class="detail-item">
        <div class="detail-value" id="detailHumidity">--%</div>
        <div class="detail-label">Влажность</div>
      </div>
      <div class="detail-item">
        <div class="detail-value" id="detailWind">-- м/с</div>
        <div class="detail-label">Ветер</div>
      </div>
      <div class="detail-item">
        <div class="detail-value" id="detailPressure">-- гПа</div>
        <div class="detail-label">Давление</div>
      </div>
    </div>

    <div class="forecast-section">
      <div class="forecast-title">Ближайшие 12 часов</div>
      <div class="hourly-container" id="hourlyContainer"></div>
    </div>

    <div class="forecast-section">
      <div class="forecast-title">Прогноз на 7 дней</div>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>
  </div>
  
  <div id="weatherError" class="error-msg" style="display:none;"></div>
</div>

<script>
// ==========================================
// ЧАСЫ
// ==========================================
class FlipClock {
  constructor(id) {
    this.cont = document.getElementById(id);
    this.digs = [];
    this.prev = '';
    this.init();
  }
  init() {
    for(let i=0;i<6;i++){
      if(i===2||i===4){
        const s=document.createElement('div');
        s.className='separator';
        s.innerHTML='<span></span><span></span>';
        this.cont.appendChild(s);
      }
      const box=document.createElement('div');
      box.className='digit-box';
      const inner=document.createElement('div');
      inner.className='digit-inner';
      const top=document.createElement('div');
      top.className='digit-half top-half';
      top.innerHTML='<div class="digit-value">0</div>';
      const bot=document.createElement('div');
      bot.className='digit-half bottom-half';
      bot.innerHTML='<div class="digit-value">0</div>';
      inner.append(top,bot);
      box.appendChild(inner);
      this.cont.appendChild(box);
      this.digs.push({box, inner, top:top.querySelector('.digit-value'), bot:bot.querySelector('.digit-value'), val:'0'});
    }
    this.upd();
    setInterval(()=>this.upd(),1000);
  }
  upd(){
    const t=new Date();
    const s=[this.pad(t.getHours()),this.pad(t.getMinutes()),this.pad(t.getSeconds())].join('');
    if(s!==this.prev){
      for(let i=0;i<6;i++){
        if(s[i]!==this.digs[i].val) this.flip(i,s[i]);
      }
      this.prev=s;
    }
  }
  pad(n){return String(n).padStart(2,'0');}
  flip(i,v){
    const d=this.digs[i];
    d.top.textContent=v; d.bot.textContent=v; d.val=v;
    d.box.classList.add('digit-flip');
    setTimeout(()=>d.box.classList.remove('digit-flip'),600);
  }
}

// ==========================================
// АНИМАЦИЯ ПОГОДЫ
// ==========================================
class WeatherAnim {
  constructor(id){
    this.c=document.getElementById(id);
    this.ctx=this.c.getContext('2d');
    this.w=0; this.h=0; this.ps=[]; this.cls=[]; this.lt=0; this.raf=0; this.wx='clear';
    this.resize();
    window.addEventListener('resize',()=>this.resize());
  }
  resize(){
    const p=this.c.parentElement;
    this.w=this.c.width=p.clientWidth;
    this.h=this.c.height=p.clientHeight;
    this.initPs();
  }
  initPs(){
    this.ps=[];
    const n=Math.max(60,Math.floor((this.w*this.h)/4000));
    for(let i=0;i<n;i++){
      this.ps.push({x:Math.random()*this.w, y:Math.random()*this.h, vx:0, vy:0, sz:Math.random()*3+1, o:Math.random()*0.5+0.3, len:0});
    }
  }
  setWx(c){
    this.wx=c; this.cls=[]; this.lt=0;
    if(c==='cloudy'||c==='rain'||c==='snow'){
      const nc=c==='cloudy'?5:8;
      for(let i=0;i<nc;i++){
        this.cls.push({x:Math.random()*this.w, y:Math.random()*this.h*0.5, spd:(Math.random()-0.5)*0.8, sz:Math.random()*0.6+0.6, op:c==='cloudy'?0.5:0.8});
      }
    }
  }
  upd(dt){
    const t=performance.now()*0.001;
    this.ps.forEach(p=>{
      switch(this.wx){
        case 'rain': case 'storm': p.vy=10+Math.random()*8; p.vx=Math.sin(t+p.x*0.01)*2; p.len=15+p.vy*0.5; if(p.y>this.h+20){p.y=-20;p.x=Math.random()*this.w;} break;
        case 'snow': p.vy=0.5+Math.random()*1.5; p.vx=Math.sin(t*0.5+p.x*0.02)*1.5; p.sz=Math.random()*4+2; if(p.y>this.h+10){p.y=-10;p.x=Math.random()*this.w;} break;
        case 'wind': p.vx=2+Math.sin(t*0.2+p.y*0.01)*3; p.vy=Math.cos(t*0.1+p.x*0.01)*0.5; if(p.x>this.w+10)p.x=-10; break;
        default: p.vx=Math.sin(t*0.05+p.x*0.005)*0.3; p.vy=Math.cos(t*0.03+p.y*0.005)*0.2;
      }
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-10)p.x=this.w+10; if(p.y<-10)p.y=this.h+10;
    });
    this.cls.forEach(c=>{c.x+=c.spd; if(c.x>this.w+300)c.x=-300;});
    if(this.wx==='storm'){
      if(Math.random()<0.005)this.lt=5;
      if(this.lt>0)this.lt--;
    }
  }
  draw(){
    const ctx=this.ctx, w=this.w, h=this.h;
    if(w === 0 || h === 0) return; // Prevent drawing on 0x0 canvas
    
    ctx.fillStyle='rgba(10,10,20,0.15)';
    ctx.fillRect(0,0,w,h);
    let g;
    if(this.wx==='rain'||this.wx==='storm'){g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'rgba(40,45,60,0.5)');g.addColorStop(1,'rgba(15,20,30,0.8)');}
    else if(this.wx==='snow'){g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'rgba(50,55,70,0.4)');g.addColorStop(1,'rgba(25,30,40,0.6)');}
    else if(this.wx==='cloudy'){g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'rgba(55,60,75,0.3)');g.addColorStop(1,'rgba(20,25,35,0.5)');}
    else{g=ctx.createRadialGradient(w*0.8,h*0.2,0,w/2,h/2,w*0.8);g.addColorStop(0,'rgba(0,80,120,0.3)');g.addColorStop(1,'rgba(10,15,25,0.6)');}
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    ctx.save();
    this.cls.forEach(c=>{ctx.globalAlpha=c.op;ctx.fillStyle='#c0c0c0';const s=50*c.sz;ctx.beginPath();ctx.arc(c.x,c.y,s*0.5,0,Math.PI*2);ctx.arc(c.x+s*0.4,c.y-s*0.1,s*0.4,0,Math.PI*2);ctx.arc(c.x+s*0.7,c.y,s*0.45,0,Math.PI*2);ctx.arc(c.x-s*0.3,c.y+s*0.1,s*0.35,0,Math.PI*2);ctx.fill();});
    ctx.restore();
    ctx.save();
    this.ps.forEach(p=>{
      ctx.globalAlpha=p.o;
      if(this.wx==='rain'||this.wx==='storm'){ctx.strokeStyle='#a0c8ff';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*1.5,p.y-p.len);ctx.stroke();
      }else if(this.wx==='snow'){ctx.fillStyle='rgba(255,255,255,0.8)';ctx.shadowColor='white';ctx.shadowBlur=5;const sz=p.sz;ctx.beginPath();ctx.moveTo(p.x,p.y-sz);ctx.lineTo(p.x,p.y+sz);ctx.moveTo(p.x-sz,p.y);ctx.lineTo(p.x+sz,p.y);ctx.moveTo(p.x-sz*0.7,p.y-sz*0.7);ctx.lineTo(p.x+sz*0.7,p.y+sz*0.7);ctx.moveTo(p.x+sz*0.7,p.y-sz*0.7);ctx.lineTo(p.x-sz*0.7,p.y+sz*0.7);ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();
      }else if(this.wx==='wind'){ctx.strokeStyle='rgba(180,200,220,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*2.5,p.y);ctx.stroke();
      }else{ctx.fillStyle=`rgba(255,255,255,${p.o*(0.7+Math.sin(performance.now()*0.001+p.x)*0.3)})`;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*0.5,0,Math.PI*2);ctx.fill();}
    });
    ctx.restore();
    if(this.lt>0){document.getElementById('lightningOverlay').style.opacity=this.lt>3?0.8:0.3;}else{document.getElementById('lightningOverlay').style.opacity=0;}
  }
  animate(){
    const dt=(performance.now()-(this.lst||performance.now()))/16;
    this.lst=performance.now();
    this.upd(dt);this.draw();
    this.raf=requestAnimationFrame(()=>this.animate());
  }
  start(){if(!this.raf)this.animate();}
  stop(){if(this.raf)cancelAnimationFrame(this.raf);this.raf=null;}
}

// ==========================================
// УТИЛИТЫ ПОГОДЫ
// ==========================================
function getWeatherIcon(code) {
  const icons = {
    0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
    45: '🌫️', 48: '🌫️',
    51: '🌦️', 53: '🌦️', 55: '🌦️', 56: '🌧️', 57: '🌧️',
    61: '🌧️', 63: '🌧️', 65: '⛈️', 66: '🌧️', 67: '🌧️',
    71: '🌨️', 73: '🌨️', 75: '❄️', 77: '🌨️',
    80: '🌦️', 81: '🌧️', 82: '⛈️',
    85: '🌨️', 86: '❄️',
    95: '⚡', 96: '⚡', 99: '⚡'
  };
  return icons[code] || '❓';
}

function getWeatherDesc(code) {
  const descs = {
    0: 'Ясно', 1: 'Преимущественно ясно', 2: 'Переменная облачность', 3: 'Пасмурно',
    45: 'Туман', 48: 'Изморозь',
    51: 'Слабая морось', 53: 'Морось', 55: 'Плотная морось',
    56: 'Ледяная морось', 57: 'Ледяная морось',
    61: 'Слабый дождь', 63: 'Дождь', 65: 'Сильный дождь',
    66: 'Ледяной дождь', 67: 'Ледяной дождь',
    71: 'Слабый снег', 73: 'Снег', 75: 'Сильный снег',
    77: 'Снежные зерна',
    80: 'Слабый ливень', 81: 'Ливень', 82: 'Экстремальный ливень',
    85: 'Слабый снегопад', 86: 'Сильный снегопад',
    95: 'Гроза', 96: 'Гроза с градом', 99: 'Сильная гроза с градом'
  };
  return descs[code] || 'Неизвестно';
}

function getWeatherType(code) {
  if (code === 0) return 'clear';
  if (code <= 3) return 'cloudy';
  if (code >= 45 && code <= 48) return 'cloudy';
  if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return 'rain';
  if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return 'snow';
  if (code >= 95) return 'storm';
  return 'clear';
}

function getDayName(dateStr, isToday = false) {
  if (isToday) return 'Сегодня';
  const date = new Date(dateStr + 'T12:00:00');
  const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
  return days[date.getDay()];
}

// ==========================================
// ЗАГРУЗКА ПОГОДЫ
// ==========================================
const wa = new WeatherAnim('weatherCanvas');
const clock = new FlipClock('flipClock');

async function loadWeather() {
  const load = document.getElementById('weatherLoading');
  const cnt = document.getElementById('weatherContent');
  const err = document.getElementById('weatherError');
  const forecastGrid = document.getElementById('forecastGrid');
  const hourlyContainer = document.getElementById('hourlyContainer');
  
  load.style.display = 'flex';
  cnt.style.display = 'none';
  err.style.display = 'none';
  forecastGrid.innerHTML = '';
  hourlyContainer.innerHTML = '';
  
  try {
    // Координаты Орла
    const lat = 52.9651;
    const lon = 36.0681;
    
    // Добавлен параметр &hourly=temperature_2m,weather_code
    const response = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,surface_pressure` +
      `&hourly=temperature_2m,weather_code` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&timezone=Europe%2FMoscow`
    );
    
    if (!response.ok) throw new Error('Ошибка сети: ' + response.status);
    
    const data = await response.json();
    const current = data.current;
    const daily = data.daily;
    const hourly = data.hourly;
    
    // Текущая погода
    document.getElementById('tempValue').textContent = Math.round(current.temperature_2m) + '°';
    document.getElementById('tempDesc').textContent = getWeatherDesc(current.weather_code);
    document.getElementById('weatherDate').textContent = new Date().toLocaleDateString('ru-RU', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
    
    document.getElementById('detailHumidity').textContent = current.relative_humidity_2m + '%';
    document.getElementById('detailWind').textContent = Math.round(current.wind_speed_10m) + ' м/с';
    document.getElementById('detailPressure').textContent = Math.round(current.surface_pressure) + ' гПа';
    
    // Анимация
    wa.setWx(getWeatherType(current.weather_code));
    
    // Прогноз на 12 часов
    const now = new Date();
    let startHourIndex = 0;
    
    // Ищем индекс ближайшего часа
    for (let i = 0; i < hourly.time.length; i++) {
        if (new Date(hourly.time[i]) >= now) {
            startHourIndex = i;
            break;
        }
    }
    
    // Выводим следующие 12 часов
    for (let i = startHourIndex; i < startHourIndex + 12; i++) {
        if (!hourly.time[i]) break;
        const timeObj = new Date(hourly.time[i]);
        const hourStr = timeObj.getHours().toString().padStart(2, '0') + ':00';
        const temp = Math.round(hourly.temperature_2m[i]);
        const icon = getWeatherIcon(hourly.weather_code[i]);
        
        const hEl = document.createElement('div');
        hEl.className = 'hourly-item';
        hEl.innerHTML = `
            <div class="hourly-time">${hourStr}</div>
            <div class="hourly-icon">${icon}</div>
            <div class="hourly-temp">${temp}°</div>
        `;
        hourlyContainer.appendChild(hEl);
    }
    
    // Прогноз на 7 дней
    const today = new Date().toISOString().split('T')[0];
    for (let i = 0; i < 7; i++) {
      const date = daily.time[i];
      const isToday = date === today;
      const dayName = getDayName(date, isToday);
      const icon = getWeatherIcon(daily.weather_code[i]);
      const tempMax = Math.round(daily.temperature_2m_max[i]);
      const tempMin = Math.round(daily.temperature_2m_min[i]);
      const desc = getWeatherDesc(daily.weather_code[i]);
      
      const dayEl = document.createElement('div');
      dayEl.className = 'forecast-day' + (isToday ? ' today' : '');
      dayEl.innerHTML = `
        <div class="forecast-day-name">${dayName}</div>
        <div class="forecast-icon">${icon}</div>
        <div class="forecast-temp">
          <span class="forecast-temp-max">${tempMax}°</span>
          <span class="forecast-temp-min">${tempMin}°</span>
        </div>
        <div class="forecast-desc">${desc}</div>
      `;
      forecastGrid.appendChild(dayEl);
    }
    
    load.style.display = 'none';
    cnt.style.display = 'block';
    
    // ВАЖНО: вызываем resize() после того, как элемент стал видимым, чтобы Canvas получил правильные размеры
    wa.resize();
    wa.start();
    
  } catch (e) {
    console.error(e);
    load.style.display = 'none';
    err.style.display = 'block';
    err.innerHTML = '⚠️ Не удалось загрузить погоду.<br><small style="opacity:0.7">Проверьте интернет или отключите VPN</small>';
    wa.setWx('cloudy');
    cnt.style.display = 'block'; // Показываем контент даже при ошибке, чтобы работал канвас
    wa.resize();
    wa.start();
  }
}

// Запуск
document.addEventListener('DOMContentLoaded', () => {
  loadWeather();
  setInterval(loadWeather, 600000); // Обновление каждые 10 минут
});
</script>
